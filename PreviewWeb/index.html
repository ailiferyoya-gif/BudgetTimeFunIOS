<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>予算時間プラン Preview</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <section class="panel">
      <div class="section-title">条件</div>
      <label>現在地名<input id="location" value="現在地"></label>
      <button id="useLocation" class="location-button" type="button">現在地を取得</button>
      <p id="locationStatus" class="status">現在地は未取得です。手入力だけでも候補を表示できます。</p>
      <label>金額 <strong id="budgetValue">3,000円</strong><input id="budget" type="range" min="0" max="20000" step="500" value="3000"></label>
      <label>時間 <strong id="hoursValue">3時間</strong><input id="hours" type="range" min="1" max="12" step="1" value="3"></label>
      <div class="section-title">移動手段</div>
      <div class="travel-modes" role="group" aria-label="移動手段">
        <button class="active" data-travel="walk">徒歩</button>
        <button data-travel="transit">公共交通</button>
      </div>
      <div class="moods" role="group" aria-label="目的">
        <button class="active" data-mood="relax">ゆっくり</button>
        <button data-mood="active">動きたい</button>
        <button data-mood="culture">発見したい</button>
        <button data-mood="food">食べたい</button>
      </div>
    </section>
    <section class="results">
      <div class="results-head">
        <h1>おすすめ案</h1>
        <span id="count">0件</span>
      </div>
      <div id="cards"></div>
    </section>
    <section class="map-panel">
      <div class="results-head">
        <h1>地図</h1>
        <span id="mapStatus">現在地未取得</span>
      </div>
      <div id="map"></div>
    </section>
  </main>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
